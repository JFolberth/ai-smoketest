name: Feature request
description: Propose a new input, catalog field, assertion type, or behaviour change.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer to discuss loose ideas first? Use [Discussions](https://github.com/JFolberth/ai-smoketest/discussions).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Optional — sketch the input, catalog field, or output shape you have in mind.
    validations:
      required: false
