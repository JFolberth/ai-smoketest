name: Bug report
description: Report a defect in the action, the runner script, or the catalog schema.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: input
    id: action_version
    attributes:
      label: Action version
      description: The tag or SHA you referenced in `uses:` (e.g. `v1`, `v1.0.0`, or a commit SHA).
      placeholder: v1
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What you expected, what you got, and any relevant log excerpts (include the `Summary:` line if you have it). Redact secrets.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimal workflow step and/or catalog entry that triggers the bug.
    validations:
      required: false
