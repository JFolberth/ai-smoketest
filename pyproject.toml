[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# Sensible baseline: pycodestyle + pyflakes + import sorting + comprehensions +
# security (bandit-lite via S) + naming. The runner is stdlib-only so most
# rules apply cleanly.
select = ["E", "F", "I", "B", "C4", "N", "S", "UP", "SIM"]
# S310 (URL open with untrusted URL) is intentionally suppressed inline in
# scripts/smoke-tests.py with `# noqa: S310` — the URL is derived from the
# controlled project_endpoint input.
ignore = ["S101"]  # allow `assert` in tests

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105"]
